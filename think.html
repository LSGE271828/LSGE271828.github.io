<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>古老的爬虫脑｜叙事 RPG UI</title>
  <style>
    :root {
      --ink: #0b0c0d;
      --paper: #d7d0c0;
      --muted: #9d988e;
      --rust: #b83a16;
      --rust-dark: #6e210e;
      --cyan: #63c8c1;
      --amber: #f0a64a;
      --panel: rgba(14, 15, 16, .90);
      --panel-soft: rgba(19, 20, 21, .73);
      --hairline: rgba(236, 228, 209, .15);
      --shadow: 0 18px 60px rgba(0, 0, 0, .48);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      background: #171819;
      color: var(--paper);
      font-family: "Noto Serif SC", "Songti SC", "STSong", Georgia, serif;
    }

    button { font: inherit; }

    .game {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-height: 620px;
      isolation: isolate;
      background:
        radial-gradient(circle at 34% 42%, rgba(115, 178, 159, .14), transparent 30%),
        radial-gradient(circle at 17% 55%, rgba(231, 93, 34, .22), transparent 18%),
        linear-gradient(118deg, #4e504d 0 8%, #252928 8% 42%, #3e443f 42% 59%, #1b1d1d 59% 100%);
    }

    /* 原创“室内酒馆”场景：纯 CSS，不依赖外部图片。 */
    .scene {
      position: absolute;
      inset: 0;
      overflow: hidden;
      filter: saturate(.72) contrast(1.08);
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: -8%;
      background:
        repeating-linear-gradient(19deg, rgba(255,255,255,.025) 0 1px, transparent 1px 7px),
        repeating-linear-gradient(101deg, rgba(0,0,0,.07) 0 2px, transparent 2px 11px),
        radial-gradient(circle at 29% 57%, rgba(255, 121, 38, .36), transparent 9%),
        radial-gradient(circle at 47% 46%, rgba(96, 204, 178, .18), transparent 20%);
      mix-blend-mode: overlay;
      transform: rotate(-1deg) scale(1.04);
      opacity: .72;
      pointer-events: none;
    }

    .wall {
      position: absolute;
      left: 0;
      top: 0;
      width: 65%;
      height: 48%;
      background:
        linear-gradient(90deg, transparent 0 62%, rgba(0,0,0,.18) 62% 63%, transparent 63%),
        repeating-linear-gradient(0deg, rgba(92, 49, 31, .78) 0 10px, rgba(125, 68, 42, .72) 10px 13px, rgba(62, 38, 30, .5) 13px 15px),
        linear-gradient(#50483f, #2d302e);
      clip-path: polygon(0 0, 100% 0, 86% 100%, 0 100%);
      box-shadow: inset -32px -22px 75px rgba(0,0,0,.52);
    }

    .kitchen {
      position: absolute;
      left: 0;
      top: 0;
      width: 43%;
      height: 43%;
      background:
        linear-gradient(90deg, rgba(219,218,208,.82) 0 18%, rgba(87,86,80,.75) 18% 20%, rgba(206,205,194,.84) 20% 39%, rgba(75,75,70,.78) 39% 41%, rgba(215,214,203,.82) 41% 100%),
        repeating-linear-gradient(0deg, transparent 0 39px, rgba(40,40,38,.22) 39px 41px),
        #a7a8a1;
      clip-path: polygon(0 0, 96% 0, 83% 100%, 0 92%);
      box-shadow: inset -20px -22px 44px rgba(0,0,0,.38);
    }

    .counter {
      position: absolute;
      left: 21%;
      top: 43%;
      width: 48%;
      height: 30%;
      background:
        linear-gradient(170deg, rgba(151,211,197,.9) 0 19%, rgba(72,116,108,.96) 20% 34%, rgba(33,65,62,.98) 34% 100%);
      clip-path: polygon(8% 0, 100% 9%, 87% 100%, 0 81%);
      box-shadow: 0 28px 45px rgba(0,0,0,.55), inset 0 1px rgba(255,255,255,.45);
    }

    .counter::before {
      content: "";
      position: absolute;
      left: 4%; right: 5%; top: 12%; height: 6px;
      background: rgba(225,245,237,.45);
      transform: rotate(2deg);
      box-shadow: 0 35px 0 rgba(0,0,0,.2), 0 70px 0 rgba(0,0,0,.18);
    }

    .bar-back {
      position: absolute;
      left: 38%;
      top: 17%;
      width: 33%;
      height: 33%;
      background:
        repeating-linear-gradient(90deg, #172b28 0 9%, #244740 9% 11%, #1e3834 11% 18%),
        linear-gradient(#24443e,#152724);
      clip-path: polygon(12% 0, 100% 9%, 89% 100%, 0 84%);
      box-shadow: inset 0 0 35px rgba(0,0,0,.7), 0 15px 35px rgba(0,0,0,.4);
    }

    .bottles {
      position: absolute;
      inset: 10% 7% 17% 9%;
      background:
        radial-gradient(ellipse at 8% 82%, #d6d39e 0 1.4%, #554923 1.5% 2.6%, transparent 2.7%),
        radial-gradient(ellipse at 18% 70%, #9bc4b7 0 1.5%, #234842 1.6% 2.8%, transparent 2.9%),
        radial-gradient(ellipse at 31% 79%, #c99863 0 1.3%, #5f2f1f 1.4% 2.8%, transparent 2.9%),
        radial-gradient(ellipse at 44% 66%, #c7c08e 0 1.4%, #494520 1.5% 2.8%, transparent 2.9%),
        radial-gradient(ellipse at 57% 78%, #8fb8ad 0 1.6%, #203d38 1.7% 3%, transparent 3.1%),
        radial-gradient(ellipse at 70% 62%, #c3975d 0 1.5%, #5e3822 1.6% 3%, transparent 3.1%),
        radial-gradient(ellipse at 82% 76%, #d6cf9e 0 1.4%, #4d4922 1.5% 2.8%, transparent 2.9%);
      opacity: .95;
    }

    .floor {
      position: absolute;
      left: -4%;
      bottom: -13%;
      width: 88%;
      height: 62%;
      transform: perspective(900px) rotateX(58deg) rotateZ(-4deg);
      transform-origin: 50% 100%;
      background:
        linear-gradient(45deg, #c8b794 25%, transparent 25% 75%, #c8b794 75%),
        linear-gradient(45deg, #313635 25%, #b04b28 25% 50%, #4b5550 50% 75%, #e4d8b9 75%);
      background-size: 54px 54px;
      box-shadow: inset 0 0 110px rgba(0,0,0,.6);
      opacity: .88;
    }

    .lamp {
      position: absolute;
      left: 17%; top: 46%;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ffd287;
      box-shadow: 0 0 18px 6px #ffac43, 0 0 75px 33px rgba(255,96,25,.38), 0 0 135px 64px rgba(255,128,44,.14);
    }

    .table {
      position: absolute;
      left: 12%; top: 27%;
      width: 22%; height: 17%;
      background: repeating-linear-gradient(94deg, #542b1d 0 13px, #793d28 13px 19px, #3e241c 19px 23px);
      clip-path: polygon(11% 0, 100% 16%, 81% 100%, 0 78%);
      box-shadow: 0 24px 38px rgba(0,0,0,.48);
    }

    .figure {
      position: absolute;
      width: 42px;
      height: 116px;
      filter: drop-shadow(0 12px 10px rgba(0,0,0,.55));
    }
    .figure::before {
      content: "";
      position: absolute;
      left: 10px; top: 0;
      width: 22px; height: 24px;
      border-radius: 50%;
      background: #cab6a0;
    }
    .figure::after {
      content: "";
      position: absolute;
      left: 3px; top: 21px;
      width: 36px; height: 92px;
      background: linear-gradient(#353a42, #17191c);
      clip-path: polygon(20% 0, 79% 0, 100% 100%, 0 100%);
    }
    .f1 { left: 35%; top: 45%; transform: rotate(-4deg); }
    .f2 { left: 43%; top: 54%; transform: rotate(3deg) scale(1.08); }
    .f2::after { background: linear-gradient(#7b3b2b, #343228); }
    .f3 { left: 28%; top: 58%; transform: rotate(-8deg) scale(.95); }
    .f3::after { background: linear-gradient(#394a4a, #232b2a); }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 32% 45%, transparent 0 42%, rgba(0,0,0,.12) 60%, rgba(0,0,0,.6) 100%),
        linear-gradient(90deg, transparent 0 58%, rgba(0,0,0,.48) 70%, rgba(0,0,0,.82) 100%);
      z-index: 2;
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      opacity: .14;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.86' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.7'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }

    /* 左下角色 HUD */
    .party {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 12;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .portrait-card {
      position: relative;
      width: 132px;
      height: 178px;
      border: 1px solid rgba(231,225,210,.22);
      background: rgba(12,14,15,.84);
      box-shadow: var(--shadow);
      overflow: hidden;
      transform-origin: bottom;
    }

    .portrait {
      position: absolute;
      inset: 42px 8px 8px;
      background:
        radial-gradient(circle at 50% 35%, #bb927e 0 16%, transparent 17%),
        radial-gradient(circle at 48% 54%, #2b2225 0 25%, transparent 26%),
        linear-gradient(135deg, #345f5d, #d0a95f 52%, #30383c 53%);
      border: 1px solid rgba(255,255,255,.14);
      filter: contrast(1.18) saturate(.74);
    }
    .portrait.alt {
      background:
        radial-gradient(circle at 50% 34%, #8f6a59 0 15%, transparent 16%),
        radial-gradient(circle at 50% 55%, #3c251b 0 24%, transparent 25%),
        linear-gradient(135deg, #d7d0bc, #963e1d 49%, #162a2c 50%);
    }

    .portrait::before {
      content: "";
      position: absolute;
      left: 22%; top: 11%;
      width: 56%; height: 69%;
      background:
        linear-gradient(110deg, transparent 0 27%, rgba(255,255,255,.28) 28% 30%, transparent 31%),
        linear-gradient(70deg, transparent 0 56%, rgba(77,19,14,.55) 57% 61%, transparent 62%),
        linear-gradient(#30262a, #111315);
      clip-path: polygon(18% 8%, 79% 0, 100% 42%, 77% 100%, 24% 94%, 0 45%);
      mix-blend-mode: multiply;
    }

    .stats {
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 36px;
      display: flex;
      gap: 9px;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      background: rgba(0,0,0,.72);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 16px;
      font-variant-numeric: tabular-nums;
    }
    .chip {
      display: inline-grid;
      place-items: center;
      width: 31px;
      height: 25px;
      padding: 0;
      border: 1px solid currentColor;
      background: rgba(0,0,0,.3);
    }
    .chip.hp { color: var(--amber); }
    .chip.mp { color: #5ed3df; }

    .meter {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 8px;
      display: flex;
      gap: 2px;
      padding: 2px 5px;
      background: rgba(0,0,0,.72);
    }
    .meter i { flex: 1; background: #c94b1d; opacity: .95; }
    .meter i.off { opacity: .16; }

    /* 对话区 */
    .dialogue {
      position: absolute;
      z-index: 11;
      right: 6%;
      top: 0;
      bottom: 108px;
      width: min(34vw, 570px);
      min-width: 420px;
      background:
        linear-gradient(90deg, rgba(65,38,24,.37), transparent 8%),
        linear-gradient(180deg, rgba(11,12,13,.96), rgba(18,17,17,.89));
      border-left: 1px solid rgba(230,222,203,.18);
      border-right: 1px solid rgba(230,222,203,.12);
      box-shadow: -30px 0 70px rgba(0,0,0,.36);
      backdrop-filter: blur(9px);
      overflow: hidden;
    }

    .dialogue::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 18px;
      background: linear-gradient(90deg, rgba(180,76,36,.4), transparent);
      opacity: .5;
    }

    .chapter-tabs {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 44px;
      border-left: 1px solid var(--hairline);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-around;
      color: rgba(222,216,204,.52);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      letter-spacing: .12em;
    }
    .chapter-tabs span { writing-mode: vertical-rl; transform: rotate(180deg); }

    .scroll-line {
      position: absolute;
      right: 26px;
      top: 14%;
      bottom: 14%;
      width: 1px;
      background: rgba(238,232,218,.25);
    }
    .scroll-line::after {
      content: "";
      position: absolute;
      left: -5px;
      top: 78%;
      width: 11px;
      height: 11px;
      border: 1px solid rgba(238,232,218,.75);
      border-radius: 50%;
      background: #111;
      box-shadow: 0 0 0 3px rgba(0,0,0,.25);
    }

    .dialogue-inner {
      height: 100%;
      padding: 8.5vh 76px 28px 60px;
      overflow: auto;
      scrollbar-width: none;
    }
    .dialogue-inner::-webkit-scrollbar { display: none; }

    .speaker-card {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 22px;
      align-items: end;
      margin-bottom: 24px;
    }

    .speaker-art {
      width: 150px;
      aspect-ratio: 4 / 5;
      background:
        linear-gradient(90deg, transparent 48%, rgba(225,95,32,.78) 49%),
        radial-gradient(circle at 48% 34%, #a78678 0 16%, transparent 17%),
        radial-gradient(ellipse at 50% 61%, #292128 0 30%, transparent 31%),
        linear-gradient(142deg, #183c4a 0 48%, #d65b27 49% 100%);
      border: 10px solid rgba(29,45,49,.72);
      box-shadow: 0 14px 32px rgba(0,0,0,.5);
      transform: rotate(-.4deg);
      position: relative;
      filter: saturate(.8) contrast(1.2);
    }
    .speaker-art::after {
      content: "";
      position: absolute;
      inset: 13% 18% 10%;
      background:
        linear-gradient(87deg, transparent 0 44%, rgba(9,9,10,.7) 45% 52%, transparent 53%),
        linear-gradient(#302327, #111416);
      clip-path: polygon(19% 7%, 77% 0, 100% 41%, 72% 100%, 26% 93%, 0 42%);
      mix-blend-mode: multiply;
    }

    .speaker-meta {
      padding-bottom: 8px;
      color: #b7b0a3;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      line-height: 1.7;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .speaker-meta b { display: block; color: #dfd8c7; font-size: 15px; }

    .line {
      margin: 0 0 18px;
      color: #c8c2b6;
      font-size: clamp(16px, 1.25vw, 21px);
      line-height: 1.75;
      text-shadow: 0 1px 0 rgba(0,0,0,.6);
    }
    .line strong { color: #efe8d7; font-weight: 700; }
    .line .role { color: #f2e7cf; font-weight: 700; }
    .line.muted { color: #8d887f; }

    .choices {
      display: grid;
      gap: 10px;
      margin-top: 26px;
    }
    .choice {
      position: relative;
      width: 100%;
      border: 0;
      color: #f0e8d5;
      text-align: left;
      padding: 15px 18px 15px 52px;
      cursor: pointer;
      background:
        linear-gradient(90deg, rgba(177,49,18,.96), rgba(122,34,14,.88) 70%, rgba(85,24,11,.72));
      box-shadow: inset 0 1px rgba(255,255,255,.1), 0 8px 18px rgba(0,0,0,.28);
      transition: transform .16s ease, filter .16s ease;
    }
    .choice:hover, .choice:focus-visible { transform: translateX(-7px); filter: brightness(1.13); outline: none; }
    .choice::before {
      content: attr(data-key);
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      width: 24px; height: 24px;
      display: grid; place-items: center;
      border: 1px solid rgba(255,255,255,.32);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }

    .continue {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      width: 100%;
      border: 0;
      padding: 15px 24px;
      color: #f7eddd;
      background: var(--rust);
      cursor: pointer;
      font-size: 20px;
      letter-spacing: .08em;
      box-shadow: 0 12px 24px rgba(66,16,4,.3);
    }
    .continue:hover { filter: brightness(1.1); }
    .continue .arrow { font-size: 24px; }

    /* 底部系统条 */
    .system-bar {
      position: absolute;
      z-index: 13;
      right: 0;
      bottom: 0;
      width: 46%;
      min-width: 660px;
      height: 108px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 24px;
      padding: 0 28px 0 40px;
      background: linear-gradient(180deg, rgba(10,11,12,.88), rgba(5,6,7,.98));
      border-top: 1px solid rgba(224,218,204,.16);
      box-shadow: 0 -16px 44px rgba(0,0,0,.35);
    }

    .icons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 44px;
    }
    .sys-icon {
      width: 38px;
      height: 38px;
      opacity: .82;
      border: 2px solid #b54b24;
      transform: rotate(4deg);
      position: relative;
    }
    .sys-icon:nth-child(2) { border-color: #5d665f; transform: rotate(-2deg); }
    .sys-icon:nth-child(3) { transform: rotate(45deg); border-radius: 44% 56% 48% 52%; }
    .sys-icon::after {
      content: "";
      position: absolute;
      inset: 7px;
      border: 1px solid currentColor;
      opacity: .45;
    }

    .clock {
      min-width: 170px;
      text-align: right;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #ddd6c8;
    }
    .clock .time { font-size: 28px; letter-spacing: .04em; }
    .clock .day { color: #99958d; font-size: 13px; }

    .hint {
      position: absolute;
      z-index: 13;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      padding: 8px 14px;
      color: rgba(238,232,219,.68);
      background: rgba(0,0,0,.34);
      border: 1px solid rgba(255,255,255,.08);
      font: 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .08em;
      backdrop-filter: blur(6px);
    }

    .toast {
      position: absolute;
      z-index: 30;
      left: 50%; bottom: 138px;
      transform: translate(-50%, 10px);
      padding: 12px 18px;
      border-left: 3px solid var(--rust);
      background: rgba(10,11,12,.92);
      color: #ddd7ca;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      box-shadow: var(--shadow);
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 1100px) {
      .dialogue { right: 0; width: 46vw; min-width: 410px; }
      .system-bar { width: 58%; min-width: 570px; }
      .party { transform: scale(.84); transform-origin: left bottom; }
      .dialogue-inner { padding-left: 38px; padding-right: 62px; }
    }

    @media (max-width: 820px) {
      html, body { height: 100%; overflow: hidden; }
      .game {
        height: 100vh;
        height: 100dvh;
        min-height: 0;
      }
      .scene { height: 38%; }
      .dialogue {
        left: 0;
        right: 0;
        top: 29%;
        bottom: 76px;
        width: 100%;
        min-width: 0;
        height: auto;
        border-top: 1px solid var(--hairline);
      }
      .dialogue-inner {
        padding: 26px 58px calc(28px + env(safe-area-inset-bottom)) 24px;
        overscroll-behavior: contain;
      }
      .line {
        margin-bottom: 15px;
        font-size: clamp(15px, 4.2vw, 18px);
        line-height: 1.68;
      }
      .choices { margin-top: 22px; padding-bottom: 8px; }
      .choice { padding: 14px 14px 14px 48px; }
      .party {
        left: 10px;
        top: 10px;
        bottom: auto;
        gap: 8px;
        transform: scale(.64);
        transform-origin: left top;
      }
      .system-bar {
        width: 100%;
        min-width: 0;
        height: 76px;
        padding: 0 max(14px, env(safe-area-inset-right)) 0 max(16px, env(safe-area-inset-left));
        gap: 12px;
      }
      .icons { justify-content: flex-start; gap: 26px; }
      .sys-icon { width: 30px; height: 30px; }
      .clock { min-width: 126px; }
      .clock .time { font-size: 24px; }
      .chapter-tabs { width: 34px; }
      .scroll-line { right: 21px; }
      .vignette {
        background:
          linear-gradient(180deg, transparent 0 22%, rgba(0,0,0,.18) 34%, rgba(0,0,0,.78) 100%);
      }
    }

    @media (max-width: 480px) {
      .dialogue { top: 25%; }
      .dialogue-inner { padding: 22px 45px 26px 18px; }
      .party { transform: scale(.54); }
      .chapter-tabs { width: 29px; font-size: 10px; }
      .scroll-line { right: 17px; }
      .choice {
        font-size: 15px;
        line-height: 1.45;
        padding-left: 44px;
      }
      .choice::before { left: 11px; }
      .icons { gap: 18px; }
      .sys-icon { width: 26px; height: 26px; }
      .clock { min-width: 112px; }
      .clock .time { font-size: 21px; }
    }
  </style>
</head>
<body>
  <main class="game" aria-label="原创黑色侦探叙事 RPG 界面演示">
    <section class="scene" aria-hidden="true">
      <div class="wall"></div>
      <div class="kitchen"></div>
      <div class="table"></div>
      <div class="bar-back"><div class="bottles"></div></div>
      <div class="counter"></div>
      <div class="floor"></div>
      <div class="lamp"></div>
      <div class="figure f1"></div>
      <div class="figure f2"></div>
      <div class="figure f3"></div>
    </section>

    <div class="vignette"></div>
    <div class="grain"></div>

  <script>
    const TARGET_URL = 'https://lsge271828.github.io/else/3.html';
    const choices = [...document.querySelectorAll('.choice')];
    const clock = document.getElementById('clock');
    const timeDigits = [...document.querySelectorAll('.time-digit')];

    function goToNextPage() {
      window.location.href = TARGET_URL;
    }

    choices.forEach(button => {
      button.addEventListener('click', goToNextPage);
    });

    document.addEventListener('keydown', event => {
      if (event.key === '1' || event.key === '2') goToNextPage();
    });

    const beijingTime = new Intl.DateTimeFormat('en-GB', {
      timeZone: 'Asia/Shanghai',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hourCycle: 'h23'
    });

    function updateClock() {
      const parts = Object.fromEntries(
        beijingTime.formatToParts(new Date()).map(part => [part.type, part.value])
      );
      const hhmm = `${parts.hour}${parts.minute}`;
      timeDigits.forEach((digit, index) => {
        digit.textContent = hhmm[index] ?? '0';
      });
      clock.textContent = `${parts.hour}:${parts.minute}`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
