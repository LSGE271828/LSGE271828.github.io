<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LISTEN — FIELD ARCHIVE</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400&family=Courier+Prime&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #050a14;
      --bg2:      #080e1c;
      --teal:     #7dd3c8;
      --teal2:    #4ab5a8;
      --gold:     #c8a84b;
      --text:     #dce8f2;
      --dim:      #576170;
      --dim2:     #3a4455;
      --panel:    rgba(5, 10, 22, 0.92);
      --border:   rgba(125, 211, 200, 0.18);
      --border2:  rgba(125, 211, 200, 0.07);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Canvas ─────────────────────────────────── */
    #bg { position: fixed; inset: 0; z-index: 0; display: block; }

    /* ── Atmosphere overlays ─────────────────────── */
    .vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse 80% 80% at 50% 60%,
        transparent 30%, rgba(3,6,15,0.65) 100%);
    }
    .scanline {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,10,25,0.04) 3px, rgba(0,10,25,0.04) 4px
      );
    }
    .cross-h {
      position: fixed; top: 50%; left: 0; width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(125,211,200,0.06), transparent);
      z-index: 1; pointer-events: none;
    }
    .cross-v {
      position: fixed; left: 50%; top: 0; width: 1px; height: 100%;
      background: linear-gradient(180deg, transparent, rgba(125,211,200,0.06), transparent);
      z-index: 1; pointer-events: none;
    }

    /* ── HUD ring ────────────────────────────────── */
    #hud {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(82vh, 82vw);
      height: min(82vh, 82vw);
      z-index: 2; pointer-events: none;
    }
    #hud-dashes { animation: spin-hud 60s linear infinite; transform-origin: 250px 250px; }
    @keyframes spin-hud { to { transform: rotate(360deg); } }

    /* ── Page header ─────────────────────────────── */
    .header {
      position: fixed; top: 28px; left: 32px; z-index: 10;
      pointer-events: none;
    }
    .header-sub {
      font-size: 10px; letter-spacing: 5px; color: var(--dim);
      text-transform: uppercase; font-weight: 300;
    }
    .header-main {
      font-size: 30px; letter-spacing: 10px; font-weight: 700;
      color: var(--text); text-transform: uppercase; line-height: 1;
      margin-top: 3px;
    }
    .header-tag {
      font-size: 10px; letter-spacing: 3px; color: var(--teal);
      text-transform: uppercase; margin-top: 5px;
      font-family: 'Courier Prime', monospace;
    }

    /* ── Center label ────────────────────────────── */
    .center-label {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, 44vh);
      z-index: 10; pointer-events: none;
      text-align: center;
    }
    .center-label span {
      font-size: 10px; letter-spacing: 5px; color: var(--dim);
      text-transform: uppercase; font-family: 'Courier Prime', monospace;
      display: block;
    }
    .center-label b {
      font-size: 13px; letter-spacing: 6px; color: var(--teal2);
      text-transform: uppercase; font-weight: 600; display: block;
      margin-top: 4px;
    }

    /* ── Music player panel ──────────────────────── */
    #player {
      position: fixed; bottom: 0; right: 0;
      width: 360px; z-index: 20;
      background: var(--panel);
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    }
    #player.hidden { transform: translateX(100%); }

    /* now-playing row */
    .np {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border2);
    }
    .art {
      width: 50px; height: 50px; flex-shrink: 0;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      background: rgba(125,211,200,0.04);
    }
    .art-ring {
      position: absolute; inset: 0;
      border: 1.5px solid transparent;
      border-top-color: var(--teal);
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.3s;
      animation: art-spin 2.4s linear infinite;
    }
    @keyframes art-spin { to { transform: rotate(360deg); } }
    #player.playing .art-ring { opacity: 0.6; }
    .art-icon {
      font-size: 18px; color: var(--teal); z-index: 1;
      font-family: 'Courier Prime', monospace;
      line-height: 1;
    }

    .np-info { flex: 1; min-width: 0; }
    .np-title {
      font-size: 14px; font-weight: 600; letter-spacing: 0.5px;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .np-artist {
      font-size: 11px; color: var(--dim); letter-spacing: 1px;
      margin-top: 3px; text-transform: uppercase;
    }
    .np-idx {
      font-family: 'Courier Prime', monospace;
      font-size: 11px; color: var(--dim); flex-shrink: 0;
    }

    /* progress */
    .progress-wrap { padding: 10px 20px 2px; }
    .progress-track {
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.07);
      cursor: pointer; position: relative;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--teal2), var(--teal));
      position: relative; transition: width 0.12s linear;
    }
    .progress-fill::after {
      content: '';
      position: absolute; right: -4px; top: -3px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 5px var(--teal);
    }
    .time-row {
      display: flex; justify-content: space-between;
      font-family: 'Courier Prime', monospace;
      font-size: 10px; color: var(--dim);
      margin-top: 6px;
    }

    /* controls */
    .controls {
      display: flex; align-items: center;
      justify-content: center; gap: 12px;
      padding: 10px 20px 14px;
    }
    .btn {
      background: none; border: none;
      color: var(--dim); cursor: pointer;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: color 0.2s, transform 0.1s;
      font-family: 'Courier Prime', monospace; border-radius: 2px;
    }
    .btn:hover { color: var(--teal); }
    .btn:active { transform: scale(0.88); }
    .btn.active { color: var(--teal); }
    .btn.play {
      width: 44px; height: 44px; font-size: 20px;
      border: 1px solid var(--border);
      background: rgba(125,211,200,0.04); color: var(--text);
    }
    .btn.play:hover {
      border-color: var(--teal);
      background: rgba(125,211,200,0.1); color: var(--teal);
    }

    /* volume */
    .vol-row {
      display: flex; align-items: center; gap: 10px;
      padding: 0 20px 14px;
    }
    .vol-icon { font-size: 13px; color: var(--dim);
                font-family: 'Courier Prime', monospace; }
    input[type=range].vol {
      flex: 1; -webkit-appearance: none; height: 2px;
      background: rgba(255,255,255,0.09);
      outline: none; border-radius: 2px; cursor: pointer;
    }
    input[type=range].vol::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--teal); cursor: pointer;
      box-shadow: 0 0 4px var(--teal2);
    }
    input[type=range].vol::-moz-range-thumb {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--teal); cursor: pointer; border: none;
    }

    /* playlist toggle bar */
    .pl-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      border-top: 1px solid var(--border2);
      cursor: pointer;
      transition: background 0.2s;
    }
    .pl-toggle:hover { background: rgba(125,211,200,0.03); }
    .pl-lbl { font-size: 10px; letter-spacing: 4px; color: var(--dim); text-transform: uppercase; }
    .pl-cnt { font-family: 'Courier Prime', monospace; font-size: 11px; color: var(--teal2); }
    .pl-arr { font-size: 11px; color: var(--dim);
              transition: transform 0.3s; display: inline-block; }
    .pl-open .pl-arr { transform: rotate(180deg); }

    /* playlist */
    .pl-list {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s cubic-bezier(.4,0,.2,1);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(125,211,200,0.15) transparent;
    }
    .pl-list::-webkit-scrollbar { width: 3px; }
    .pl-list::-webkit-scrollbar-thumb { background: rgba(125,211,200,0.15); }
    .pl-open .pl-list { max-height: 280px; }

    .pl-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.025);
      transition: background 0.18s;
    }
    .pl-item:hover { background: rgba(125,211,200,0.05); }
    .pl-item.cur { background: rgba(125,211,200,0.07); }
    .pl-item.cur .pl-it-title { color: var(--teal); }

    .pl-num {
      font-family: 'Courier Prime', monospace;
      font-size: 11px; color: var(--dim);
      width: 18px; text-align: center; flex-shrink: 0;
    }
    .pl-item.cur .pl-num { display: none; }
    .pl-bars {
      display: none; gap: 2px; align-items: flex-end;
      height: 14px; width: 18px; flex-shrink: 0;
    }
    .pl-item.cur.playing .pl-bars { display: flex; }
    .pl-bar {
      width: 3px; background: var(--teal); border-radius: 1px;
      animation: bar-pulse 0.55s ease-in-out infinite alternate;
    }
    .pl-bar:nth-child(2) { animation-delay: 0.15s; }
    .pl-bar:nth-child(3) { animation-delay: 0.08s; animation-duration: 0.45s; }
    @keyframes bar-pulse {
      from { height: 3px; } to { height: 14px; }
    }

    .pl-info { flex: 1; min-width: 0; }
    .pl-it-title {
      font-size: 13px; color: var(--text); letter-spacing: 0.3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pl-it-artist { font-size: 10px; color: var(--dim); margin-top: 2px; }
    .pl-dur {
      font-family: 'Courier Prime', monospace;
      font-size: 10px; color: var(--dim); flex-shrink: 0;
    }

    /* toggle button (bottom-right corner) */
    #tog-btn {
      position: fixed; bottom: 20px; right: 16px;
      z-index: 25;
      display: none; /* shown only when player is hidden on small screens */
      width: 44px; height: 44px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--teal); cursor: pointer; font-size: 20px;
      align-items: center; justify-content: center;
      backdrop-filter: blur(12px);
      transition: background 0.2s;
    }
    #tog-btn:hover { background: rgba(125,211,200,0.1); }

    /* corner deco */
    .corner {
      position: fixed; z-index: 3; pointer-events: none;
      width: 40px; height: 40px;
    }
    .corner.tl { top: 12px; left: 12px;
      border-top: 1px solid rgba(125,211,200,0.25);
      border-left: 1px solid rgba(125,211,200,0.25); }
    .corner.tr { top: 12px; right: 12px;
      border-top: 1px solid rgba(125,211,200,0.25);
      border-right: 1px solid rgba(125,211,200,0.25); }
    .corner.bl { bottom: 12px; left: 12px;
      border-bottom: 1px solid rgba(125,211,200,0.25);
      border-left: 1px solid rgba(125,211,200,0.25); }
    .corner.br { bottom: 12px; right: 376px;
      border-bottom: 1px solid rgba(125,211,200,0.25);
      border-right: 1px solid rgba(125,211,200,0.25); }

    /* NetEase fallback iframe (hidden) */
    #ne-frame { display: none; }
  </style>
</head>

<script>
/* ─── TICK MARKS ─────────────────────────────────────── */
(function(){
  const g = document.getElementById('ticks');
  for(let i = 0; i < 72; i++){
    const angle = (i / 72) * Math.PI * 2 - Math.PI / 2;
    const isMajor = i % 9 === 0;
    const outer = 238;
    const inner = isMajor ? 228 : 232;
    const x1 = 250 + Math.cos(angle) * outer;
    const y1 = 250 + Math.sin(angle) * outer;
    const x2 = 250 + Math.cos(angle) * inner;
    const y2 = 250 + Math.sin(angle) * inner;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', isMajor ? 'rgba(125,211,200,0.5)' : 'rgba(125,211,200,0.18)');
    line.setAttribute('stroke-width', isMajor ? '1.5' : '0.8');
    g.appendChild(line);
  }
})();
</script>

<script>
/* ─── THREE.JS PARTICLE TREE ─────────────────────────── */
(function(){

const canvas = document.getElementById('bg');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x050a14, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(52, window.innerWidth/window.innerHeight, 0.1, 120);
camera.position.set(0, 1.2, 9);
camera.lookAt(0, 1.5, 0);

/* ── Particle buffers ── */
const pts  = [];  // tree + base
const cols = [];

/* ── Recursive branch generator ── */
const MAX_D = 8;

function branch(ox, oy, oz, dx, dy, dz, len, depth){
  if(depth < 0 || len < 0.08) return;

  const ex = ox + dx * len;
  const ey = oy + dy * len;
  const ez = oz + dz * len;

  const segments = Math.max(4, Math.floor(len * 18));
  const bright = 0.15 + (depth / MAX_D) * 0.85;
  const isTip  = depth <= 2;
  const noise  = (1 - depth / MAX_D) * 0.06;

  for(let i = 0; i <= segments; i++){
    const t = i / segments;
    pts.push(
      ox + (ex - ox) * t + (Math.random() - 0.5) * noise,
      oy + (ey - oy) * t + (Math.random() - 0.5) * noise,
      oz + (ez - oz) * t + (Math.random() - 0.5) * noise
    );
    const r = bright * (isTip ? 1.1 : 0.95);
    const g = bright * 1.02;
    const b = bright * (isTip ? 0.88 : 1.08);
    cols.push(r, g, b);
  }

  /* tip particle burst */
  if(isTip){
    for(let k = 0; k < 6; k++){
      pts.push(
        ex + (Math.random() - 0.5) * 0.15,
        ey + (Math.random() - 0.5) * 0.15,
        ez + (Math.random() - 0.5) * 0.15
      );
      const tb = bright + Math.random() * 0.3;
      cols.push(tb * 1.1, tb, tb * 0.85);
    }
  }

  /* child branches */
  const nKids = depth > 4 ? 3 : 2;
  for(let k = 0; k < nKids; k++){
    const baseAngle = (k / nKids) * Math.PI * 2 + Math.random() * 1.0;
    const spreadH   = 0.35 + (1 - depth / MAX_D) * 0.75;
    const spreadV   = 0.2  + (1 - depth / MAX_D) * 0.4;

    /* perturb direction */
    const cos = Math.cos(baseAngle);
    const sin = Math.sin(baseAngle);
    let nx = dx * Math.cos(spreadH) + cos * Math.sin(spreadH);
    let nz = dz * Math.cos(spreadH) + sin * Math.sin(spreadH);
    let ny = dy + spreadV * (0.3 + Math.random() * 0.5);

    /* normalise */
    let nl = Math.sqrt(nx*nx + ny*ny + nz*nz);
    nx /= nl; ny /= nl; nz /= nl;

    /* bias upward so branches don't droop completely */
    ny = Math.max(ny, 0.15);
    nl = Math.sqrt(nx*nx + ny*ny + nz*nz);
    nx /= nl; ny /= nl; nz /= nl;

    branch(ex, ey, ez, nx, ny, nz,
      len * (0.48 + Math.random() * 0.28), depth - 1);
  }
}

/* trunk */
branch(0, -1.8, 0,  0, 1, 0,  2.6, MAX_D);

/* structural cross at crown (like the metal frame in the game) */
const crownY = 0.8;
for(let i = 0; i < 4; i++){
  const a = (i / 4) * Math.PI * 2;
  for(let t = 0; t <= 20; t++){
    const tt = t / 20;
    pts.push(Math.cos(a) * tt * 0.45, crownY + (Math.random()-0.5)*0.06, Math.sin(a) * tt * 0.45);
    const b2 = 0.6 + tt * 0.4;
    cols.push(b2, b2 * 0.95, b2 * 0.85);
  }
}
/* vertical post */
for(let t = 0; t <= 30; t++){
  const tt = t / 30;
  pts.push((Math.random()-0.5)*0.04, crownY - 0.3 + tt * 0.6, (Math.random()-0.5)*0.04);
  const b3 = 0.5 + tt * 0.4;
  cols.push(b3, b3, b3 * 1.05);
}

/* base platform (rectangular grid) */
for(let i = 0; i < 4000; i++){
  const bx = (Math.random() - 0.5) * 4.5;
  const bz = (Math.random() - 0.5) * 4.5;
  const by = -1.8 - Math.random() * 0.18;
  const distCentre = Math.sqrt(bx*bx + bz*bz);
  const b4 = Math.max(0, 0.35 - distCentre * 0.06) + Math.random() * 0.1;
  pts.push(bx, by, bz);
  cols.push(b4 * 0.85, b4, b4 * 1.1);
}
/* platform edge highlight */
for(let i = 0; i < 800; i++){
  const a2 = Math.random() * Math.PI * 2;
  const side = Math.random() < 0.5
    ? [(Math.random()-0.5)*4.5, (Math.random()<0.5 ? -2.25 : 2.25)]
    : [(Math.random()<0.5 ? -2.25 : 2.25), (Math.random()-0.5)*4.5];
  pts.push(side[0], -1.8 + (Math.random()-0.5)*0.06, side[1]);
  const be = 0.25 + Math.random() * 0.2;
  cols.push(be * 0.8, be, be * 1.15);
}

/* base glow core */
for(let i = 0; i < 600; i++){
  const a3 = Math.random() * Math.PI * 2;
  const r2 = Math.random() * 0.9;
  pts.push(Math.cos(a3)*r2, -1.78, Math.sin(a3)*r2);
  const bg = 0.4 + Math.random() * 0.35;
  cols.push(bg * 0.75, bg, bg * 1.05);
}

/* ── Build geometry ── */
const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
geo.setAttribute('color',    new THREE.Float32BufferAttribute(cols, 3));

const mat = new THREE.PointsMaterial({
  size: 0.028, vertexColors: true,
  transparent: true, opacity: 0.92,
  sizeAttenuation: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const tree = new THREE.Points(geo, mat);
scene.add(tree);

/* ── Ambient drifting particles ── */
const ambPts = [], ambCols = [];
for(let i = 0; i < 360; i++){
  ambPts.push(
    (Math.random()-0.5) * 14,
    Math.random() * 10 - 2.5,
    (Math.random()-0.5) * 14
  );
  ambCols.push(0.2, 0.55, 0.5);
}
const ambGeo = new THREE.BufferGeometry();
ambGeo.setAttribute('position', new THREE.Float32BufferAttribute(ambPts, 3));
ambGeo.setAttribute('color',    new THREE.Float32BufferAttribute(ambCols, 3));
const ambMat = new THREE.PointsMaterial({
  size: 0.04, vertexColors: true,
  transparent: true, opacity: 0.35,
  sizeAttenuation: true, depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const amb = new THREE.Points(ambGeo, ambMat);
scene.add(amb);

const ambPos  = ambGeo.attributes.position.array;
const ambPos0 = ambPos.slice();  /* original Y values */

/* ── Mouse parallax ── */
let mx = 0, my = 0;
document.addEventListener('mousemove', e => {
  mx = (e.clientX / window.innerWidth  - 0.5) * 2;
  my = (e.clientY / window.innerHeight - 0.5) * 2;
});

/* ── Animate ── */
let t = 0;
(function loop(){
  requestAnimationFrame(loop);
  t += 0.004;

  tree.rotation.y = t * 0.07 + mx * 0.12;
  tree.rotation.x = my * 0.04;

  /* drift particles upward in a loop */
  for(let i = 0; i < 360; i++){
    ambPos[i*3+1] = ((ambPos0[i*3+1] + t * 0.35 + i * 0.09) % 10) - 2.5;
  }
  ambGeo.attributes.position.needsUpdate = true;
  amb.rotation.y = t * 0.015;

  /* gentle camera sway toward mouse */
  camera.position.x += (mx * 0.6 - camera.position.x) * 0.018;
  camera.position.y += (-my * 0.3 + 1.2 - camera.position.y) * 0.018;
  camera.lookAt(0, 1.5, 0);

  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

})();
</script>

<script>
/* ─── MUSIC PLAYER ───────────────────────────────────── */
(function(){

/* ╔══════════════════════════════════════════════════╗
   ║  SONG LIST  — fill in your own src / duration   ║
   ║                                                  ║
   ║  src options:                                    ║
   ║  · relative path: "audio/song.mp3"               ║
   ║  · hosted CDN URL                                ║
   ║  · NetEase redirect (may be region-locked):      ║
   ║    "https://music.163.com/song/media/outer/      ║
   ║     url?id=SONG_ID.mp3"                          ║
   ╚══════════════════════════════════════════════════╝ */
const SONGS = [
  {
    id:       '3371305930',
    title:    '示例曲目 01',
    artist:   'Arknights: Endfield OST',
    duration: '4:23',
    /* 替换为实际音频链接 */
    src:      'https://music.163.com/song/media/outer/url?id=3371305930.mp3',
    /* 后备链接 (NetEase 外链播放) */
    fallback: 'https://music.163.com/#/song?id=3371305930'
  },
  {
    id:       '2700421303',
    title:    '示例曲目 02',
    artist:   'Arknights: Endfield OST',
    duration: '3:55',
    src:      'https://music.163.com/song/media/outer/url?id=2700421303.mp3',
    fallback: 'https://music.163.com/#/song?id=2700421303'
  },
  {
    id:       '65778',
    title:    '千本桜',
    artist:   '初音ミク',
    duration: '4:11',
    src:      'https://music.163.com/song/media/outer/url?id=65778.mp3',
    fallback: 'https://music.163.com/#/song?id=65778'
  }
];

/* ── State ── */
let cur      = 0;
let playing  = false;
let shuffle  = false;
let repeat   = false;
let seeking  = false;

/* ── DOM refs ── */
const playerEl  = document.getElementById('player');
const audio     = document.getElementById('audio');
const npTitle   = document.getElementById('np-title');
const npArtist  = document.getElementById('np-artist');
const npIdx     = document.getElementById('np-idx');
const progFill  = document.getElementById('prog-fill');
const progTrack = document.getElementById('prog-track');
const tCur      = document.getElementById('t-cur');
const tTot      = document.getElementById('t-tot');
const btnPlay   = document.getElementById('btn-play');
const btnPrev   = document.getElementById('btn-prev');
const btnNext   = document.getElementById('btn-next');
const btnShuf   = document.getElementById('btn-shuf');
const btnRep    = document.getElementById('btn-rep');
const volEl     = document.getElementById('vol');
const volVal    = document.getElementById('vol-val');
const plToggle  = document.getElementById('pl-toggle');
const plList    = document.getElementById('pl-list');
const plCnt     = document.getElementById('pl-cnt');

/* ── Helpers ── */
function fmt(s){
  if(isNaN(s)||!isFinite(s)) return '0:00';
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function nextIdx(){
  if(shuffle) return Math.floor(Math.random() * SONGS.length);
  return (cur + 1) % SONGS.length;
}
function prevIdx(){
  return (cur - 1 + SONGS.length) % SONGS.length;
}

/* ── Render playlist ── */
function renderList(){
  plList.innerHTML = '';
  SONGS.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'pl-item' + (i === cur ? ' cur' : '') +
                  (i === cur && playing ? ' playing' : '');
    d.innerHTML =
      `<div class="pl-num">${i+1}</div>
       <div class="pl-bars">
         <div class="pl-bar"></div>
         <div class="pl-bar"></div>
         <div class="pl-bar"></div>
       </div>
       <div class="pl-info">
         <div class="pl-it-title">${s.title}</div>
         <div class="pl-it-artist">${s.artist}</div>
       </div>
       <div class="pl-dur">${s.duration}</div>`;
    d.addEventListener('click', () => load(i, true));
    plList.appendChild(d);
  });
  plCnt.textContent = `${SONGS.length} Tracks`;
  npIdx.textContent = `${cur+1}/${SONGS.length}`;
}

/* ── Load song ── */
function load(idx, autoplay){
  cur = idx;
  const s = SONGS[cur];
  npTitle.textContent  = s.title;
  npArtist.textContent = s.artist;
  audio.src = s.src;
  audio.load();
  progFill.style.width = '0%';
  tCur.textContent = '0:00';
  tTot.textContent = s.duration;

  if(autoplay){
    audio.play().catch(err => {
      /* CORS or region error → open fallback NetEase page */
      console.warn('Audio play failed:', err.message);
      if(s.fallback) window.open(s.fallback, '_blank');
    });
    setPlaying(true);
  } else {
    setPlaying(false);
  }
  renderList();
}

/* ── Toggle playing state ── */
function setPlaying(val){
  playing = val;
  btnPlay.textContent = playing ? '⏸' : '▶';
  playerEl.classList.toggle('playing', playing);
  document.querySelectorAll('.pl-item').forEach((el, i) => {
    el.classList.toggle('playing', i === cur && playing);
  });
}

/* ── Controls ── */
btnPlay.addEventListener('click', () => {
  if(!audio.src || audio.src === window.location.href){
    load(cur, true); return;
  }
  if(playing){
    audio.pause(); setPlaying(false);
  } else {
    audio.play().catch(err => {
      const s = SONGS[cur];
      if(s.fallback) window.open(s.fallback,'_blank');
    });
    setPlaying(true);
  }
});

btnPrev.addEventListener('click', () => {
  if(audio.currentTime > 3){
    audio.currentTime = 0; return;
  }
  load(prevIdx(), playing);
});

btnNext.addEventListener('click', () => {
  load(nextIdx(), true);
});

btnShuf.addEventListener('click', () => {
  shuffle = !shuffle;
  btnShuf.classList.toggle('active', shuffle);
});

btnRep.addEventListener('click', () => {
  repeat = !repeat;
  audio.loop = repeat;
  btnRep.classList.toggle('active', repeat);
});

/* ── Progress ── */
audio.addEventListener('timeupdate', () => {
  if(!seeking && audio.duration){
    const pct = (audio.currentTime / audio.duration) * 100;
    progFill.style.width = pct + '%';
    tCur.textContent = fmt(audio.currentTime);
    tTot.textContent = fmt(audio.duration);
  }
});

progTrack.addEventListener('click', e => {
  if(!audio.duration) return;
  const r = progTrack.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});

progTrack.addEventListener('mousedown', () => { seeking = true; });
window.addEventListener('mouseup', e => {
  if(seeking){
    seeking = false;
    const r = progTrack.getBoundingClientRect();
    const pct = Math.min(1, Math.max(0,(e.clientX - r.left) / r.width));
    if(audio.duration) audio.currentTime = pct * audio.duration;
  }
});

audio.addEventListener('ended', () => {
  if(!repeat) load(nextIdx(), true);
});

audio.addEventListener('play',  () => setPlaying(true));
audio.addEventListener('pause', () => setPlaying(false));

/* ── Volume ── */
audio.volume = 0.8;
volEl.addEventListener('input', () => {
  audio.volume = volEl.value / 100;
  volVal.textContent = volEl.value + '%';
});

/* ── Playlist toggle ── */
plToggle.addEventListener('click', () => {
  plToggle.parentElement.classList.toggle('pl-open');
  /* keep parent = player */
  document.getElementById('player').classList.toggle('pl-open');
});

/* ── Init ── */
load(0, false);
renderList();

})();
</script>

</body>
